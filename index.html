<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formula Woman</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="intro-active">

<!--INTRO-->
<div class="site-hero" id="site-hero">
  <div class="hero-title"><span class="word-formula">Formula </span><span class="word-woman">Woman</span></div>
  <div class="hero-sub"><i>Exclusive Women's Racing</i></div>
</div>

<!--NAVBAR-->
<header class="site-header visible" id="site-header">
    <div id="navbar-container"></div>
  </header>

<main>

  <!--COUNTDOWN-->
  <section class="countdown-section">
    <p class="countdown-label" id="countdown-round">ROUND —</p>    
    <h2 class="countdown-race-name" id="countdown-race-name">—</h2>
    <p class="countdown-date" id="countdown-date">—</p>
    <div class="countdown-timer-row">
      <div class="countdown-unit">
        <span class="countdown-number" id="cd-days">00</span>
        <span class="countdown-label-small">DAYS</span>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit">
        <span class="countdown-number" id="cd-hours">00</span>
        <span class="countdown-label-small">HOURS</span>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit">
        <span class="countdown-number" id="cd-mins">00</span>
        <span class="countdown-label-small">MINS</span>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit">
        <span class="countdown-number" id="cd-secs">00</span>
        <span class="countdown-label-small">SECS</span>
      </div>
    </div>
    <a href="calendar.html" class="btn">View Full Schedule</a>
  </section>

  <!-- BANNER CARDS -->
  <div class="banners-grid">
    <div class="banner-section banner-live">
      <h2>Watch LIVE</h2>
      <a href="subscribe.html" class="btn">Subscribe</a>
    </div>
    <div class="banner-section banner-tickets">
      <h2>Experience Hospitality</h2>
      <a href="tickets.html" class="btn">Buy Tickets</a>
    </div>
    <div class="banner-section banner-merch">
      <h2>Buy Merch</h2>
      <a href="merch.html" class="btn">Shop Now</a>
    </div>
  </div>

</main>

<footer id="contact">
  <p>&copy; 2003&ndash;2026 Formula Woman World Championship Limited</p>
  <a href="#" class="btn">&uarr;</a>
</footer>

<script src="js/navbar.js" defer></script>

</body>
</html>
