<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standings | Formula Woman</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <div id="navbar-container"></div>

  <!-- PAGE HEADER -->
  <section class="results-hero">
    <p class="shop-hero-eyebrow">2026 Season</p>
    <h1 class="results-hero-title">World Championship <span style="color:rgb(245,53,170)">Standings</span></h1>
    <p class="results-hero-sub">After Round <span id="after-round">5</span> · Saudi Arabia</p>

    <!-- PILL TOGGLE -->
    <div class="standings-toggle-wrap">
      <div class="standings-toggle" id="standings-toggle">
        <div class="toggle-track">
          <div class="toggle-pill" id="toggle-pill"></div>
          <button class="toggle-opt" id="opt-drivers" data-tab="drivers">Drivers</button>
          <button class="toggle-opt" id="opt-teams"   data-tab="teams">Constructors</button>
        </div>
      </div>
    </div>
  </section>

  <main class="results-main">

    <!-- DRIVER STANDINGS -->
    <div id="tab-drivers" class="standings-panel">
      <div class="standings-table-wrap">
        <table class="standings-table" id="drivers-table">
          <thead>
            <tr>
              <th class="col-pos">Pos</th>
              <th class="col-driver">Driver</th>
              <th class="col-team">Team</th>
              <th class="col-pts">Points</th>
              <th class="col-wins">Wins</th>
              <th class="col-gap">Gap</th>
            </tr>
          </thead>
          <tbody id="drivers-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- TEAM STANDINGS -->
    <div id="tab-teams" class="standings-panel hidden">
      <div class="standings-table-wrap">
        <table class="standings-table" id="teams-table">
          <thead>
            <tr>
              <th class="col-pos">Pos</th>
              <th class="col-team-name">Constructor</th>
              <th class="col-pts">Points</th>
              <th class="col-wins">Wins</th>
              <th class="col-gap">Gap</th>
            </tr>
          </thead>
          <tbody id="teams-tbody"></tbody>
        </table>
      </div>
    </div>

  </main>

  <footer style="display:flex;align-items:center;justify-content:space-between;padding:28px 40px;border-top:1px solid rgba(255,255,255,0.06);color:#444;font-size:12px;margin-top:40px;">
    <p>&copy; 2003–2026 Formula Woman World Championship Limited</p>
    <a href="#" class="btn">Back to Top ↑</a>
  </footer>

  <script src="js/navbar.js" defer></script>
  <script src="js/results.js" defer></script>

</body>
</html>
