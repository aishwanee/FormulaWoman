<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Formula Woman</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-page">

  <!-- navbar.js injects header automatically -->

  <main class="auth-main">

    <!-- Left panel -->
    <div class="auth-panel auth-panel-left">
      <div class="auth-panel-brand">
        <span class="auth-brand-formula">Formula</span>
        <span class="auth-brand-woman">Woman</span>
      </div>
      <div class="auth-panel-circles">
        <div class="apc apc-1"></div>
        <div class="apc apc-2"></div>
        <div class="apc apc-3"></div>
      </div>
    </div>

    <!-- Right panel: form -->
    <div class="auth-panel auth-panel-right">

      <div class="auth-tabs">
        <a href="signin.html"   class="auth-tab">Sign In</a>
        <a href="register.html" class="auth-tab active">Register</a>
      </div>

      <h1 class="auth-heading">Create Account</h1>
      <p class="auth-sub">Join the grid.</p>

      <div id="auth-error"   class="auth-message auth-message-error"   aria-live="polite"></div>
      <div id="auth-success" class="auth-message auth-message-success" aria-live="polite"></div>

      <div class="auth-form" id="register-form">

        <div class="auth-row-2">
          <div class="auth-field">
            <label class="auth-label" for="first-name">First Name</label>
            <input class="auth-input" id="first-name" type="text" placeholder="First Name" autocomplete="given-name">
          </div>
          <div class="auth-field">
            <label class="auth-label" for="last-name">Last Name</label>
            <input class="auth-input" id="last-name" type="text" placeholder="Last Name" autocomplete="family-name">
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="email">Email Address</label>
          <input class="auth-input" id="email" type="email" placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="auth-field">
          <label class="auth-label" for="password">Password</label>
          <div class="auth-input-wrap">
            <input class="auth-input" id="password" type="password"
                   placeholder="Min. 8 characters" autocomplete="new-password">
            <button class="auth-eye" id="toggle-pw" aria-label="Toggle password visibility" type="button">
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <!-- strength bar -->
          <div class="pw-strength-bar" id="pw-bar">
            <div class="pw-strength-fill" id="pw-fill"></div>
          </div>
          <span class="pw-strength-label" id="pw-label"></span>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="confirm-password">Confirm Password</label>
          <div class="auth-input-wrap">
            <input class="auth-input" id="confirm-password" type="password"
                   placeholder="Repeat your password" autocomplete="new-password">
            <button class="auth-eye" id="toggle-cpw" aria-label="Toggle password visibility" type="button">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <label class="auth-check" style="margin-bottom:20px">
          <input type="checkbox" id="terms">
          I agree to the <a href="terms.html" class="auth-link">Terms of Service</a>
          and <a href="privacy.html" class="auth-link">Privacy Policy</a>
        </label>

        <button class="auth-submit" id="register-btn" type="button">Create Account</button>

        <div class="auth-divider"><span>or register with</span></div>

        <div class="auth-socials">
          <button class="auth-social-btn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          <button class="auth-social-btn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Facebook
          </button>
        </div>

        <p class="auth-switch">
          Already have an account?
          <a href="signin.html" class="auth-link auth-link-pink">Sign in</a>
        </p>

      </div>
    </div>

  </main>

  <script src="js/navbar.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
